name: docs

on:
  push:
    branches: [master]

permissions:
  actions: none
  artifact-metadata: none
  attestations: none
  checks: none
  contents: read
  deployments: none
  discussions: none
  id-token: write
  issues: none
  models: none
  packages: none
  pages: write
  pull-requests: none
  repository-projects: none
  security-events: none
  statuses: none

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install rust (nightly)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly

      - name: Build docs
        run: cargo doc --no-deps --all-features

      - name: Prepare docs
        run: |
          mkdir -p _site/master
          echo '<meta http-equiv="refresh" content="0;url=master/logged_stream/index.html">' > _site/index.html
          echo '<meta http-equiv="refresh" content="0;url=logged_stream/index.html">' > _site/master/index.html
          mv target/doc/* _site/master

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0

  deploy:
    name: Deploy to GitHub Pages
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
